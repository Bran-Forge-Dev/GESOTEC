<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESOTEC - Gestión de Usuarios</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/AdminGestionUsuarios.css">
</head>
<body>

<div class="app-container">

    <header class="main-header">
        <div class="header-logo-block">
            <img src="../images/icon_gesotec.png" alt="Logo">
        </div>
        <div class="header-title-block">
            <h1>Gestión de Soporte Tecnológico</h1>
        </div>
    </header>

    <div class="app-body">
        
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="AdminPerfil.html" class="nav-item">
                    <span class="material-icons">dashboard</span> Panel de Control
                </a>
                <a href="AdminGestionUsuarios.html" class="nav-item active">
                    <span class="material-icons">people</span> Usuarios
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-pill">
                    <div class="user-avatar">👤</div>
                    <div class="user-meta">
                        <p style="color:white; font-size:12px; margin:0;">Administrador</p>
                        <a href="AdminVerPerfil.html" class="profile-link">Ver Perfil</a>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            
            <section class="gestion-usuarios-box">
                <div class="content-header">
                    <h2>Gestión de Usuarios</h2>

                    <div class="search-box">
                        <span class="material-icons">search</span>
                        <input type="text" id="searchInput" placeholder="Buscar usuario por nombre o correo...">
                    </div>

                    <a href="AdminNuevoUsuario.html" class="btn-nuevo">
                        <span class="material-icons">add</span> Nuevo usuario
                    </a>
                </div>

                <table class="tabla-usuarios">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Fecha Creación</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td>Ana López</td>
                            <td>ana.lopez@example.com</td>
                            <td>Administrador</td>
                            <td>2023-01-15</td>
                            <td class="acciones">
                                <a href="AdminEditarUsuario.html" class="icon-btn edit" title="Editar Usuario">
                                    <span class="material-icons">edit</span>
                                </a>
                                <button class="icon-btn delete" onclick="confirmarEliminacion('Ana López')" title="Eliminar Usuario">
                                    <span class="material-icons">delete</span>
                                </button>
                            </td>
                        </tr>
                        </tbody>
                </table>
            </section>

        </main>
    </div>
</div>

<script src="../js/AdminGestionUsuarios.js"></script>

</body>
</html>
