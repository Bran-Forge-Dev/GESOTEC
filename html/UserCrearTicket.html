<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESOTEC - Crear Ticket</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/UserCrearTicket.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-logo-block">
                <img src="../images/icon_gesotec.png" alt="Logo GESOTEC">
            </div>
            <div class="header-title-block">
                <h1>Gestión de Soporte Tecnológico</h1>
            </div>
        </header>

        <div class="app-body">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <a href="UserPerfil.html" class="nav-item">
                        🏠 Panel de Control
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <div class="user-pill">
                        <div class="user-avatar">👤</div>
                        <div class="user-meta">
                            <p>Usuario</p>
                            <a href="UserVerPerfil.html" class="profile-link">Ver Perfil</a>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <h2 class="form-title">Crear Nuevo Ticket de Soporte</h2>

                <form id="ticketForm" class="ticket-form-container">
                    <div class="form-group">
                        <label for="asunto">Asunto</label>
                        <input type="text" id="asunto" placeholder="Ej.: Problema con la impresora" required>
                    </div>

                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" rows="6" placeholder="Describa su problema en detalle..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="prioridad">Prioridad</label>
                        <select id="prioridad">
                            <option value="Baja">Baja</option>
                            <option value="Media" selected>Media</option>
                            <option value="Alta">Alta</option>
                            <option value="Crítica">Crítica</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Archivo Adjunto (Opcional)</label>
                        <div class="upload-zone" id="dropZone">
                            <div class="upload-content">
                                <span class="upload-icon">☁️</span>
                                <p><span class="blue-text">Subir un archivo</span> o arrastrar y soltar</p>
                                <p class="upload-hint">PNG, JPG, PDF hasta 10MB</p>
                            </div>
                            <input type="file" id="fileInput" hidden>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="window.history.back()">Cancelar</button>
                        <button type="submit" class="btn-primary">Crear Ticket</button>
                    </div>
                </form>
            </main>
        </div>
    </div>
    <script src="../js/UserCrearTicket.js"></script>
</body>
</html>
